<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 测试</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    .section {
      margin: 20px 0;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
    }
    #result {
      margin-top: 20px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 5px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>TAP 系统 API 测试</h1>

  <div class="section">
    <h2>登录测试</h2>
    <input type="text" id="username" value="admin" placeholder="用户名">
    <input type="password" id="password" value="admin123" placeholder="密码">
    <button onclick="testLogin()">登录</button>
  </div>

  <div id="result">点击按钮测试 API...</div>

  <script>
    const API_BASE_URL = 'http://localhost:3000/api';

    async function testLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const resultDiv = document.getElementById('result');

      resultDiv.textContent = '正在登录...';

      try {
        const response = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        resultDiv.textContent = JSON.stringify(result, null, 2);

        if (result.success) {
          localStorage.setItem('token', result.data.token);
          localStorage.setItem('user', JSON.stringify(result.data.user));
          resultDiv.textContent += '\n\n✅ 登录成功！Token 已保存到 localStorage';
        }
      } catch (error) {
        resultDiv.textContent = '❌ 错误: ' + error.message;
      }
    }

    // 页面加载时检查 localStorage
    window.onload = function() {
      const token = localStorage.getItem('token');
      const user = localStorage.getItem('user');
      if (token) {
        document.getElementById('result').textContent = 
          '已保存的 Token (前50字符): ' + token.substring(0, 50) + '...\n\n' +
          '用户信息: ' + user;
      }
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LazyFirst TikTok 数据采集器 - 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-container">
    <header>
      <h1>LazyFirst TikTok 数据采集器</h1>
      <p>设置</p>
    </header>
    
    <main>
      <!-- API配置 -->
      <section class="section">
        <h2>API配置</h2>
        
        <div class="form-group">
          <label for="api-url">API地址</label>
          <input type="text" id="api-url" placeholder="https://lazyfirst.com/api">
          <p class="help-text">LazyFirst系统的API地址</p>
        </div>
        
        <div class="form-group">
          <button id="test-api-btn" class="btn-secondary">测试API连接</button>
          <p id="api-test-result" class="help-text"></p>
        </div>
      </section>
      
      <!-- 同步设置 -->
      <section class="section">
        <h2>同步设置</h2>
        
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="auto-sync">
            自动同步
          </label>
          <p class="help-text">开启后，浏览TikTok时自动同步达人数据到LazyFirst</p>
        </div>
        
        <div class="form-group">
          <label for="sync-interval">同步间隔（秒）</label>
          <input type="number" id="sync-interval" min="10" max="3600" value="60">
          <p class="help-text">自动同步的时间间隔</p>
        </div>
        
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="show-notifications">
            显示通知
          </label>
          <p class="help-text">同步完成后显示浏览器通知</p>
        </div>
      </section>
      
      <!-- 数据显示 -->
      <section class="section">
        <h2>数据显示</h2>
        
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="show-overlay">
            显示覆盖层
          </label>
          <p class="help-text">在TikTok页面上显示LazyFirst历史数据</p>
        </div>
        
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="show-gmv">
            显示GMV标签
          </label>
          <p class="help-text">在达人信息上显示GMV标签</p>
        </div>
        
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="show-fv">
            显示FV标签
          </label>
          <p class="help-text">在达人信息上显示FV标签</p>
        </div>
        
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="show-batch-import">
            显示批量导入按钮
          </label>
          <p class="help-text">在搜索页显示批量导入按钮</p>
        </div>
      </section>
      
      <!-- 缓存管理 -->
      <section class="section">
        <h2>缓存管理</h2>
        
        <div class="form-group">
          <p class="help-text">本地缓存可以减少API调用次数，提高性能</p>
          <button id="clear-cache-btn" class="btn-secondary">清除缓存</button>
          <p id="cache-size" class="help-text"></p>
        </div>
      </section>
      
      <!-- 保存按钮 -->
      <div class="actions">
        <button id="save-btn" class="btn-primary">保存设置</button>
        <button id="reset-btn" class="btn-secondary">恢复默认</button>
      </div>
      
      <div id="save-status" class="status-message"></div>
    </main>
  </div>
  
  <script src="options.js"></script>
</body>
</html>

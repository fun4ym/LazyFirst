<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LazyFirst TikTok 数据采集器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- 未登录状态 -->
    <div id="login-view" class="view">
      <div class="logo">
        <h2>LazyFirst</h2>
        <p>TikTok 数据采集器</p>
      </div>
      
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名">
      </div>
      
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码">
      </div>
      
      <button id="login-btn" class="btn-primary">登录</button>
      
      <div id="login-error" class="error-message"></div>
      
      <div id="lockout-message" class="lockout-message" style="display: none;">
        登录失败次数过多，请等待 <span id="lockout-timer">5:00</span> 后重试
      </div>
    </div>
    
    <!-- 已登录状态 -->
    <div id="main-view" class="view" style="display: none;">
      <div class="header">
        <div class="user-info">
          <h3 id="user-name">用户名</h3>
          <p id="user-role">角色</p>
        </div>
        <button id="logout-btn" class="btn-secondary">退出</button>
      </div>
      
      <div class="status">
        <div class="status-item">
          <span class="status-label">采集状态</span>
          <span id="collect-status" class="status-value">正在运行</span>
        </div>
        <div class="status-item">
          <span class="status-label">今日采集</span>
          <span id="today-count" class="status-value">0</span>
        </div>
      </div>
      
      <!-- TikTok网站链接 -->
      <div class="tiktok-link">
        <a href="https://www.tiktok.com" target="_blank" class="tiktok-url">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.07A6.33 6.33 0 0 0 5 15.56a6.34 6.34 0 0 0 10.14 5.12 6.35 6.35 0 0 0 1.94-5.12V6.69a8.16 8.16 0 0 0 4.3 1.36V4.82a4.78 4.78 0 0 1-1.79-.13z"/>
          </svg>
          TikTok.com
        </a>
      </div>

      <div class="settings">
        <div class="setting-item">
          <label for="debug-mode">DEBUG模式（显示通知）</label>
          <input type="checkbox" id="debug-mode">
        </div>
      </div>
      
      <div class="actions">
        <button id="view-data-btn" class="btn-secondary">查看数据</button>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>

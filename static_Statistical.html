<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业务员数据统计与分析</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        /* 上传区域 */
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            background: #eef0ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e0e5ff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 1.1em;
        }

        .file-input {
            display: none;
        }

        .file-info {
            margin-top: 15px;
            padding: 10px 20px;
            background: #d4edda;
            border-radius: 8px;
            color: #155724;
            display: none;
        }

        /* 业务员选择区域 */
        .salesperson-selection {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .salesperson-item {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background: #f0f2ff;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .salesperson-item:hover {
            background: #e0e5ff;
        }

        .salesperson-item.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .salesperson-item input {
            display: none;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        /* 图表区域 */
        .chart-container {
            position: relative;
            height: 500px;
            margin-top: 20px;
        }

        .no-data-message {
            text-align: center;
            color: #999;
            padding: 50px;
            font-size: 1.2em;
        }

        /* 统计信息 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        /* 按钮 */
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        /* 加载动画 */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        /* 日期范围选择器 */
        .date-range-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .date-range-selector label {
            font-weight: bold;
            color: #666;
        }

        .date-range-selector select {
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
            background: white;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .upload-area {
                padding: 30px;
            }
            
            .chart-container {
                height: 350px;
            }
            
            .button-group {
                flex-wrap: wrap;
            }
            
            .date-range-selector {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 业务员数据统计与分析系统</h1>

        <!-- 上传区域 -->
        <div class="card">
            <h2 class="card-title">📁 数据上传</h2>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📤</div>
                <p class="upload-text">点击或拖拽上传 XLSX 文件</p>
                <p style="color: #999; font-size: 0.9em; margin-top: 10px;">
                    请上传包含"归属业务员"和"日期"列的Excel文件
                </p>
                <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls">
            </div>
            <div class="file-info" id="fileInfo"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在解析文件...</p>
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="card" id="statsCard" style="display: none;">
            <h2 class="card-title">📈 统计概览</h2>
            <div class="stats-grid" id="statsGrid"></div>
        </div>

        <!-- 业务员选择与图表 -->
        <div class="card" id="chartCard" style="display: none;">
            <h2 class="card-title">🎯 业务员数据对比分析</h2>
            
            <!-- 日期范围选择器 -->
            <div class="date-range-selector" id="dateRangeSelector" style="display: none;">
                <label for="dateRange">日期范围：</label>
                <select id="dateRange">
                    <option value="all">全部日期</option>
                    <option value="7">最近7天</option>
                    <option value="14">最近14天</option>
                    <option value="30">最近30天</option>
                </select>
            </div>
            
            <p style="color: #666; margin-bottom: 15px;">请选择要对比的业务员：</p>
            <div class="salesperson-selection" id="salespersonSelection"></div>
            <div class="button-group">
                <button class="btn btn-primary" onclick="updateChart()">更新图表</button>
                <button class="btn btn-secondary" onclick="selectAll()">全选</button>
                <button class="btn btn-secondary" onclick="clearAll()">清空</button>
                <button class="btn btn-secondary" onclick="toggleDateRange()">日期筛选</button>
            </div>
            <div class="chart-container">
                <canvas id="lineChart"></canvas>
            </div>
            <div class="no-data-message" id="noDataMessage" style="display: none;">
                请至少选择一个业务员以显示图表
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let rawData = [];
        let groupedData = {};
        let salespersons = [];
        let dates = [];
        let chartInstance = null;
        let showDateRange = false;

        // 颜色数组用于不同业务员
        const colors = [
            '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF',
            '#FF9F40', '#7C4DFF', '#00E676', '#FF5252', '#448AFF',
            '#69F0AE', '#FFD740', '#B388FF', '#8C9EFF', '#84FFFF'
        ];

        // 初始化上传区域
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // 处理文件
        function handleFile(file) {
            if (!file.name.match(/\.(xlsx|xls)$/i)) {
                alert('请上传 .xlsx 或 .xls 格式的文件！');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('fileInfo').style.display = 'none';

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    rawData = XLSX.utils.sheet_to_json(firstSheet);

                    if (rawData.length === 0) {
                        throw new Error('文件为空或格式不正确');
                    }

                    // 解析数据
                    parseData();
                    
                    // 显示文件信息
                    document.getElementById('fileInfo').textContent = 
                        `✅ 已成功加载文件: ${file.name} (共 ${rawData.length} 条记录)`;
                    document.getElementById('fileInfo').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';

                } catch (error) {
                    console.error(error);
                    alert('文件解析失败: ' + error.message);
                    document.getElementById('loading').style.display = 'none';
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // 解析数据
        function parseData() {
            // 获取所有日期
            dates = [...new Set(rawData.map(item => item['日期'] || item['date']))]
                .filter(d => d)
                .sort((a, b) => new Date(a) - new Date(b));

            // 获取所有业务员
            salespersons = [...new Set(rawData.map(item => item['归属业务员'] || item['salesperson']))]
                .filter(s => s);

            // 按业务员和日期分组统计
            groupedData = {};
            salespersons.forEach(sp => {
                groupedData[sp] = {};
                dates.forEach(date => {
                    groupedData[sp][date] = 0;
                });
            });

            // 统计数量
            rawData.forEach(item => {
                const sp = item['归属业务员'] || item['salesperson'];
                const date = item['日期'] || item['date'];
                if (sp && date && groupedData[sp]) {
                    groupedData[sp][date] = (groupedData[sp][date] || 0) + 1;
                }
            });

            // 显示统计和图表区域
            showStats();
            showChartSection();
        }

        // 显示统计信息
        function showStats() {
            const statsCard = document.getElementById('statsCard');
            const statsGrid = document.getElementById('statsGrid');

            if (salespersons.length === 0) {
                statsCard.style.display = 'none';
                return;
            }

            statsCard.style.display = 'block';

            // 计算统计数据
            const totalRecords = rawData.length;
            const totalSalespersons = salespersons.length;
            const totalDates = dates.length;
            const avgPerDay = (totalRecords / totalDates).toFixed(1);
            const maxCount = Math.max(...Object.values(groupedData).flatMap(d => Object.values(d)));

            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${totalRecords.toLocaleString()}</div>
                    <div class="stat-label">总记录数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalSalespersons}</div>
                    <div class="stat-label">业务员人数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalDates}</div>
                    <div class="stat-label">统计天数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${avgPerDay}</div>
                    <div class="stat-label">日均记录数</div>
                </div>
            `;
        }

        // 显示图表区域
        function showChartSection() {
            const chartCard = document.getElementById('chartCard');
            const selection = document.getElementById('salespersonSelection');
            const dateRangeSelector = document.getElementById('dateRangeSelector');

            if (salespersons.length === 0) {
                chartCard.style.display = 'none';
                return;
            }

            chartCard.style.display = 'block';
            dateRangeSelector.style.display = 'flex';

            // 生成业务员选择项
            selection.innerHTML = salespersons.map((sp, index) => `
                <label class="salesperson-item" data-salesperson="${sp}">
                    <input type="checkbox" value="${sp}" checked>
                    <span class="color-dot" style="background: ${colors[index % colors.length]}"></span>
                    <span>${sp}</span>
                </label>
            `).join('');

            // 添加点击事件
            document.querySelectorAll('.salesperson-item').forEach(item => {
                item.addEventListener('click', function() {
                    this.classList.toggle('selected');
                    const checkbox = this.querySelector('input');
                    checkbox.checked = !checkbox.checked;
                });
            });

            // 默认全选
            selectAll();

            // 创建初始图表
            updateChart();
        }

        // 切换日期范围选择器
        function toggleDateRange() {
            showDateRange = !showDateRange;
            document.getElementById('dateRangeSelector').style.display = showDateRange ? 'flex' : 'none';
            updateChart();
        }

        // 全选
        function selectAll() {
            document.querySelectorAll('.salesperson-item').forEach(item => {
                item.classList.add('selected');
                item.querySelector('input').checked = true;
            });
            updateChart();
        }

        // 清空
        function clearAll() {
            document.querySelectorAll('.salesperson-item').forEach(item => {
                item.classList.remove('selected');
                item.querySelector('input').checked = false;
            });
            updateChart();
        }

        // 更新图表
        function updateChart() {
            const selected = Array.from(document.querySelectorAll('.salesperson-item input:checked'))
                .map(input => input.value);

            const noDataMessage = document.getElementById('noDataMessage');
            const ctx = document.getElementById('lineChart').getContext('2d');
            const dateRangeValue = document.getElementById('dateRange').value;

            if (selected.length === 0) {
                if (chartInstance) {
                    chartInstance.destroy();
                }
                noDataMessage.style.display = 'block';
                return;
            }

            noDataMessage.style.display = 'none';

            // 根据日期范围筛选数据
            let filteredDates = [...dates];
            let filteredDatasets = [];

            if (dateRangeValue !== 'all' && showDateRange) {
                const days = parseInt(dateRangeValue);
                const cutoffDate = new Date();
                cutoffDate.setDate(cutoffDate.getDate() - days);
                
                filteredDates = dates.filter(date => {
                    try {
                        const dateObj = new Date(date);
                        return dateObj >= cutoffDate;
                    } catch {
                        return true;
                    }
                });
            }

            // 准备数据
            const datasets = selected.map((sp, index) => ({
                label: sp,
                data: filteredDates.map(date => groupedData[sp][date] || 0),
                borderColor: colors[index % colors.length],
                backgroundColor: colors[index % colors.length] + '20',
                borderWidth: 3,
                fill: false,
                tension: 0.3,
                pointRadius: 5,
                pointHoverRadius: 8
            }));

            // 销毁旧图表
            if (chartInstance) {
                chartInstance.destroy();
            }

            // 创建新图表
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: filteredDates.map(d => formatDate(d)),
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                padding: 20,
                                font: {
                                    size: 14
                                }
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(0,0,0,0.85)',
                            padding: 12,
                            titleFont: { 
                                size: 14,
                                weight: 'bold'
                            },
                            bodyFont: { 
                                size: 13 
                            },
                            footerFont: {
                                size: 11
                            },
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ${context.raw}`;
                                },
                                footer: function(tooltipItems) {
                                    if (showDateRange && dateRangeValue !== 'all') {
                                        return `显示最近 ${dateRangeValue} 天的数据`;
                                    }
                                    return '';
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            display: true,
                            title: {
                                display: true,
                                text: '日期',
                                font: { 
                                    size: 14, 
                                    weight: 'bold' 
                                }
                            },
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            display: true,
                            title: {
                                display: true,
                                text: '记录数量',
                                font: { 
                                    size: 14, 
                                    weight: 'bold' 
                                }
                            },
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    },
                    animations: {
                        tension: {
                            duration: 800,
                            easing: 'easeOutQuad',
                            from: 0.5,
                            to: 0.3,
                            loop: false
                        }
                    }
                }
            });
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                const date = new Date(dateStr);
                return `${date.getMonth() + 1}/${date.getDate()}`;
            } catch {
                return dateStr;
            }
        }
    </script>
</body>
</html>

version: '3.8'

services:
  # MongoDB数据库
  mongodb:
    image: mongo:7
    container_name: tap-mongodb
    restart: always
    command: mongod --auth --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: tap_system
      MONGO_INITDB_ROOT_USERNAME: tapadmin
      MONGO_INITDB_ROOT_PASSWORD: tap_admin_pass_2024

  # 后端API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tap-backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://tapsystem:tap_system_pass_2024@mongodb:27017/tap_system?authSource=tap_system
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRE: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    # 注意：生产环境不使用 volume 挂载代码，确保使用镜像内的代码

  # 前端 - 使用nginx在80端口提供静态服务
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: tap-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

volumes:
  mongodb_data:

networks:
  default:
    name: tap-system_default
    external: true

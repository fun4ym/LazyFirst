version: '3.8'

services:
  # MongoDB数据库
  mongodb:
    image: mongo:7
    container_name: tap-mongodb
    restart: always
    command: mongod --auth --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: tap_system
      MONGO_INITDB_ROOT_USERNAME: tapadmin
      MONGO_INITDB_ROOT_PASSWORD: s0MxUUtrWwdjfX70W2gf

  # 后端API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tap-backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://tapsystem:5Qb0Q9WqztimCNuzfVoX@mongodb:27017/tap_system?authSource=tap_system
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRE: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # LINE Messaging API 配置
      LINE_CHANNEL_ID: 2010752592
      LINE_CHANNEL_SECRET: ef9d582f7f895cc9e2a57550e3a7a1e4
      LINE_CHANNEL_ACCESS_TOKEN: 6IQVdJAjyJhQr5OhwaQJwGI0gHtTzMGHnhDkreW4oS6mp/fE5Bw8iHDSRNC0jGvnI9Efa6hS25dyKcCoL9jy2X9iToKJtfDY6dySH8xeD4fsUbWbiskFZqx8PXi3jW99FtAScg4IezhB4Y3GjSlErQdB04t89/1O/w1cDnyilFU=
      LINE_OA_ID: "@380xfno"
      LINE_WEBHOOK_BASE_URL: https://tap.lazyfirst.com
      FRONTEND_URL: https://tap.lazyfirst.com
      # 公开反馈/BID二维码图片的基础URL（本次新增，BD联系卡 imageUrl 依赖）
      # 前端 nginx 已代理 /uploads 到后端，故用 tap.lazyfirst.com 同域 https 可达
      BACKEND_BASE_URL: https://tap.lazyfirst.com
    # 注意：生产环境不使用 volume 挂载代码，确保使用镜像内的代码

  # 前端 - 使用nginx在80端口提供静态服务
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: tap-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - /etc/nginx/ssl/tap.lazyfirst.com/:/etc/nginx/ssl/

volumes:
  mongodb_data:
    external: true
    name: tap-system_mongodb_data

version: '3.8'

services:
  # MongoDB数据库
  mongodb:
    image: mongo:7
    container_name: tap-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: tap_system

  # 后端API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tap-backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/tap_system
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRE: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    # 注意：生产环境不使用 volume 挂载代码，确保使用镜像内的代码

  # 前端 - 使用nginx在8080端口提供静态服务
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: tap-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongodb_data:

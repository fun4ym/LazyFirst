<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAP TikTok Sync</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .status {
      padding: 15px 20px;
      border-bottom: 1px solid #eee;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .status-label {
      font-size: 14px;
      color: #666;
    }

    .status-value {
      font-size: 14px;
      font-weight: 500;
    }

    .status-value.connected {
      color: #10b981;
    }

    .status-value.disconnected {
      color: #ef4444;
    }

    .content {
      padding: 20px;
    }

    .button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }

    .button-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .button-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .button-secondary {
      background: #f3f4f6;
      color: #374151;
    }

    .button-secondary:hover {
      background: #e5e7eb;
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .settings {
      padding: 20px;
      border-top: 1px solid #eee;
    }

    .setting-item {
      margin-bottom: 15px;
    }

    .setting-item label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 5px;
    }

    .setting-item input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .setting-item input:focus {
      outline: none;
      border-color: #667eea;
    }

    .data-count {
      text-align: center;
      padding: 15px;
      background: #f9fafb;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .data-count .number {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }

    .data-count .label {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    .error {
      padding: 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      color: #dc2626;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .success {
      padding: 10px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      color: #16a34a;
      font-size: 13px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>TAP TikTok Sync</h1>
    <p>样品数据同步插件</p>
  </div>

  <div class="status">
    <div class="status-item">
      <span class="status-label">页面状态</span>
      <span class="status-value disconnected" id="pageStatus">未检测到</span>
    </div>
    <div class="status-item">
      <span class="status-label">API连接</span>
      <span class="status-value disconnected" id="apiStatus">未连接</span>
    </div>
  </div>

  <div class="content">
    <div id="message"></div>

    <div class="data-count" id="dataCount" style="display: none;">
      <div class="number" id="sampleCount">0</div>
      <div class="label">检测到样品数据</div>
    </div>

    <button class="button button-primary" id="scanBtn" disabled>
      📊 扫描当前页面
    </button>
    <button class="button button-secondary" id="syncBtn" disabled>
      🔄 同步到TAP系统
    </button>
    <button class="button button-secondary" id="exportBtn" disabled>
      📥 导出为Excel
    </button>
  </div>

  <div class="settings">
    <div class="setting-item">
      <label for="apiUrl">TAP系统API地址</label>
      <input type="text" id="apiUrl" placeholder="http://localhost:3000/api">
    </div>
    <div class="setting-item">
      <label for="apiToken">API Token</label>
      <input type="password" id="apiToken" placeholder="输入你的JWT Token">
    </div>
    <button class="button button-secondary" id="saveBtn">保存设置</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>

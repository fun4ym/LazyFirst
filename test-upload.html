<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试Excel上传</title>
</head>
<body>
  <h1>测试Excel文件上传</h1>

  <form id="uploadForm" enctype="multipart/form-data">
    <div>
      <label for="file">选择Excel文件:</label>
      <input type="file" id="file" name="file" accept=".xlsx,.xls" required>
    </div>
    <br>
    <button type="submit">上传</button>
  </form>

  <div id="result"></div>

  <script>
    const token = localStorage.getItem('token') || 'YOUR_TOKEN_HERE';
    const apiUrl = 'http://localhost:3000/api/report-orders/import';

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const fileInput = document.getElementById('file');
      const file = fileInput.files[0];

      if (!file) {
        alert('请选择文件');
        return;
      }

      const formData = new FormData();
      formData.append('file', file);

      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<p>上传中...</p>';

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`
          },
          body: formData
        });

        const data = await response.json();
        console.log('Response:', data);

        if (response.ok) {
          resultDiv.innerHTML = `
            <p style="color: green;">${data.message}</p>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
        } else {
          resultDiv.innerHTML = `
            <p style="color: red;">上传失败: ${data.message || response.statusText}</p>
            <pre>${JSON.stringify(data, null, 2)}</pre>
          `;
        }
      } catch (error) {
        console.error('Error:', error);
        resultDiv.innerHTML = `
          <p style="color: red;">请求失败: ${error.message}</p>
          <p>请检查:</p>
          <ul>
            <li>后端服务器是否运行在 http://localhost:3000</li>
            <li>是否已登录并获取token</li>
            <li>浏览器控制台是否有CORS错误</li>
          </ul>
        `;
      }
    });
  </script>
</body>
</html>
